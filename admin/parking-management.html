<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parking Management - Smart Parking System</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar Navigation -->
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <h2>Admin Panel</h2>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li>
                        <a href="dashboard.html">
                            <i class="fas fa-tachometer-alt"></i>
                            Dashboard
                        </a>
                    </li>
                    <li class="active">
                        <a href="parking-management.html">
                            <i class="fas fa-parking"></i>
                            Parking Management
                        </a>
                    </li>
                    <li>
                        <a href="users.html">
                            <i class="fas fa-users"></i>
                            User Management
                        </a>
                    </li>
                    <li>
                        <a href="reports.html">
                            <i class="fas fa-chart-bar"></i>
                            Reports
                        </a>
                    </li>
                    <li>
                        <a href="settings.html">
                            <i class="fas fa-cog"></i>
                            Settings
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <header class="admin-header">
                <div class="header-left">
                    <h1>Parking Management</h1>
                </div>
                <div class="header-right">
                    <div class="user-info">
                        <span id="adminName">Admin User</span>
                        <button onclick="handleLogout()" class="logout-btn">
                            <i class="fas fa-sign-out-alt"></i> Logout
                        </button>
                    </div>
                </div>
            </header>

            <div class="parking-management-content">
                <!-- Add New Space Form -->
                <div class="management-section">
                    <h2>Add New Parking Space</h2>
                    <form id="addSpaceForm" onsubmit="return handleAddSpace(event)">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="spaceNumber">Space Number</label>
                                <input type="text" id="spaceNumber" name="spaceNumber" required>
                            </div>
                            <div class="form-group">
                                <label for="spaceType">Space Type</label>
                                <select id="spaceType" name="spaceType" required>
                                    <option value="regular">Regular</option>
                                    <option value="disabled">Disabled</option>
                                    <option value="electric">Electric Vehicle</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="spaceLocation">Location Description</label>
                            <input type="text" id="spaceLocation" name="spaceLocation" required>
                        </div>
                        <button type="submit" class="action-btn">
                            <i class="fas fa-plus"></i> Add Space
                        </button>
                    </form>
                </div>

                <!-- Parking Spaces List -->
                <div class="management-section">
                    <h2>Parking Spaces</h2>
                    <div class="search-bar">
                        <input type="text" id="searchSpace" placeholder="Search spaces...">
                        <button class="search-btn">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                    <div class="spaces-list" id="spacesList">
                        <!-- Spaces will be added dynamically -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/auth.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/parking-management.js"></script>
</body>
</html>
